name: Desktop release

# Build the الجامع desktop app for macOS, Windows and Linux. Every run uploads
# the installers as downloadable artifacts; pushing a version tag additionally
# attaches them to a GitHub Release.
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (build-only).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail fast if Electron's bundled Node cannot open SQLite — the app depends on
  # node:sqlite (used by the server and monlite).
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install Electron
        working-directory: js/apps/desktop
        run: npm install
      - name: Verify node:sqlite is available in Electron
        working-directory: js/apps/desktop
        env: { ELECTRON_RUN_AS_NODE: "1" }
        run: npx electron -e "const s=require('node:sqlite'); new s.DatabaseSync(':memory:').exec('create table t(x)'); console.log('node:sqlite OK in Electron', process.versions.electron, 'node', process.versions.node)"

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match package.json version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          V=$(node -p "require('./js/apps/desktop/package.json').version")
          [ "v$V" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package version v$V"; exit 1; }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Build dashboard
        working-directory: js/apps/dashboard
        run: |
          npm install
          npm run build

      - name: Install server runtime deps (flat, production)
        working-directory: js
        run: npm install --omit=dev

      - name: Install desktop deps
        working-directory: js/apps/desktop
        run: npm install

      - name: Build installers (no publish)
        working-directory: js/apps/desktop
        run: npx electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: jami-${{ matrix.os }}
          path: |
            js/apps/desktop/release/*.dmg
            js/apps/desktop/release/*.exe
            js/apps/desktop/release/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            **الجامع — الشبكة المعرفية للحديث الشريف** · تطبيق سطح مكتب يعمل محلياً بالكامل.

            عند أول تشغيل يُنزّل التطبيق قاعدة المعرفة (~٤٫٥ غ.ب) مرة واحدة من Hugging Face.

            **macOS:** التطبيق غير موقّع بعد — عند أول فتح: انقر بالزر الأيمن على التطبيق ثم «فتح» ثم «فتح» مرة أخرى.
            **Windows:** إذا ظهر تحذير SmartScreen: «مزيد من المعلومات» ثم «تشغيل على أي حال».
            **Linux:** `chmod +x` لملف AppImage ثم شغّله.

            البحث الدلالي والمحادثة البحثية اختياريان ويحتاجان مفتاح Gemini مجانياً
            (قائمة «ملف ← الإعدادات») — بقية التطبيق يعمل دون اتصال ودون مفتاح.
