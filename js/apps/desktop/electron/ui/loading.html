<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<title>الجامع</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: grid; place-items: center;
    font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #f9f9f7; color: #0b0b0b;
  }
  @media (prefers-color-scheme: dark) { body { background: #0d0d0d; color: #f4f4f2; } }
  .card { width: min(560px, 88vw); text-align: center; padding: 8px; }
  .logo { font-size: 40px; font-weight: 700; letter-spacing: 1px; }
  .logo span { color: #0d5c50; }
  @media (prefers-color-scheme: dark) { .logo span { color: #35a08f; } }
  .sub { color: #6e6c66; margin: 6px 0 34px; font-size: 15px; }
  .bar { height: 12px; border-radius: 99px; background: rgba(128,128,128,.18); overflow: hidden; }
  .fill { height: 100%; width: 0; background: #0d5c50; border-radius: 99px; transition: width .25s ease; }
  @media (prefers-color-scheme: dark) { .fill { background: #35a08f; } }
  .status { margin-top: 14px; font-size: 14px; color: #52514e; min-height: 22px; }
  @media (prefers-color-scheme: dark) { .status, .sub { color: #b7b6ad; } }
  .pct { font-variant-numeric: tabular-nums; font-weight: 600; }
  .hint { margin-top: 26px; font-size: 12.5px; color: #898781; line-height: 1.8; }
  .err { color: #c0392b; }
  button {
    margin-top: 20px; background: #0d5c50; color: #fff; border: 0; border-radius: 10px;
    padding: 9px 26px; font: inherit; font-size: 15px; cursor: pointer; display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">الجامِع<span>.</span></div>
    <div class="sub">الشبكة المعرفية للحديث الشريف</div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="status" id="status">جارٍ التحضير…</div>
    <div class="hint" id="hint">
      يجري تنزيل قاعدة المعرفة مرة واحدة فقط (٤٫٥ غيغابايت تقريباً) من Hugging Face.<br/>
      يمكن استئناف التنزيل تلقائياً إذا انقطع.
    </div>
    <button id="retry">إعادة المحاولة</button>
  </div>
<script>
  const $ = (id) => document.getElementById(id);
  const gb = (n) => (n / 1e9).toFixed(2);
  window.jami.on("dl:need", () => { $("status").textContent = "الاتصال بمصدر البيانات…"; });
  window.jami.on("dl:progress", (p) => {
    $("fill").style.width = p.pct + "%";
    $("status").innerHTML = `تنزيل قاعدة المعرفة — <span class="pct">${p.pct.toFixed(1)}٪</span> · ${gb(p.done)} / ${gb(p.total)} غ.ب`;
  });
  window.jami.on("dl:retry", (r) => {
    $("status").innerHTML = `تعذّر الاتصال، إعادة المحاولة (${r.attempt})…`;
  });
  window.jami.on("dl:done", () => { $("fill").style.width = "100%"; $("status").textContent = "اكتمل التنزيل."; });
  window.jami.on("dl:starting", () => { $("status").textContent = "بدء تشغيل المحرك…"; $("hint").style.display = "none"; });
  window.jami.on("dl:error", (e) => {
    $("status").innerHTML = `<span class="err">تعذّر التحضير: ${e.error}</span>`;
    $("retry").style.display = "inline-block";
  });
  $("retry").onclick = () => { $("retry").style.display = "none"; $("status").textContent = "…"; window.jami.retry(); };
</script>
</body>
</html>
